name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      # These must be set in GitHub repo secrets:
      #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
      #   S3_BUCKET                  (e.g. hiq-cortex-web-preview)
      #   CLOUDFRONT_DISTRIBUTION_ID (e.g. E1ABCDEF234567)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync assets (long cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "sitemap*.xml" \
            --exclude "robots.txt" \
            --exclude "404.html"

      - name: Sync HTML + XML + robots (no cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" --include "*.html"
          aws s3 cp dist/sitemap-index.xml s3://${{ secrets.S3_BUCKET }}/sitemap-index.xml \
            --content-type "application/xml" \
            --cache-control "public, max-age=300"
          aws s3 cp dist/sitemap-0.xml s3://${{ secrets.S3_BUCKET }}/sitemap-0.xml \
            --content-type "application/xml" \
            --cache-control "public, max-age=300"
          aws s3 cp dist/robots.txt s3://${{ secrets.S3_BUCKET }}/robots.txt \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
